name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'frontend/node_modules'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Python syntax check
        run: python3 -m py_compile $(find backend -name "*.py")

      - name: Verify backend app imports
        env:
          SESSION_SECRET: test-secret
          DATASOURCE_ENCRYPTION_KEY: test-encryption-key-32-bytes-ok
          TABLEAU_ENCRYPTION_KEY: test-tableau-key-32-bytes-ok
        run: cd backend && python3 -c "from app.main import app; print('Backend app OK')"
