name: Data Agent Nightly QA

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      nightly_report:
        description: "Optional JSON report path committed or generated by the real-chain benchmark"
        required: false
        default: ""

jobs:
  data-agent-nightly:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mulan
          POSTGRES_PASSWORD: mulan
          POSTGRES_DB: mulan_bi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://mulan:mulan@localhost:5432/mulan_bi_test
      SESSION_SECRET: test-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      DATASOURCE_ENCRYPTION_KEY: test-datasource-key-32-bytes-ok!!
      TABLEAU_ENCRYPTION_KEY: test-tableau-key-32-bytes-ok!!
      LLM_ENCRYPTION_KEY: test-llm-key-32-bytes-ok!!!!
      SERVICE_JWT_SECRET: test-service-jwt-secret-32-bytes!
      PYTHONPATH: backend
      NIGHTLY_REPORT: ${{ github.event.inputs.nightly_report || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run mocked Golden Set gate
        run: |
          cd backend
          pytest \
            tests/services/data_agent/test_homepage_data_qa_golden_set.py \
            tests/services/data_agent/test_result_guardrail.py \
            tests/services/data_agent/test_semantic_operators.py \
            tests/services/data_agent/test_query_plan_patch.py \
            -q

      - name: Evaluate schema drift report
        if: ${{ env.NIGHTLY_REPORT != '' }}
        run: python3 scripts/data-agent-schema-drift-alert.py "$NIGHTLY_REPORT"
