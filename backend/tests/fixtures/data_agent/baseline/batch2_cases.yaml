- id: batch2.q10_loss_root_cause_liaoning_fujian_2024
  group: batch2
  question: "辽宁、福建 2024 巨亏原因"
  connection_fixture: superstore_tableau
  expected_patch:
    patch_type: reset_plan
    contains:
      operator: root_cause
      metrics: ["利润"]
      dimensions: ["省份"]
      filters:
        - field_caption: "省份"
          operator: "in"
          value: ["辽宁", "福建"]
        - field_caption: "订单日期"
          operator: "between"
          value: ["2024-01-01", "2024-12-31"]
  baseline:
    mode: mcp_snapshot
    result_shape:
      required_fields: ["省份", "贡献维度", "利润", "贡献率"]
      max_rows: 100
    tolerances:
      numeric_rel: 0.001
  expected_gate: pass
