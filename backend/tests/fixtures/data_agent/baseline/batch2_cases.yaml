- id: batch2.q1_overall_kpis
  group: batch2
  question: "整体的销售额、利润、利润率、客户数、客单价是什么样子"
  connection_fixture: superstore_tableau
  expected_patch:
    patch_type: reset_plan
    contains:
      metrics: ["销售额", "利润", "客户数"]
      derived_metrics: ["利润率", "客单价"]
  baseline:
    mode: mcp_snapshot
    expected_plan:
      metrics: ["销售额", "利润", "客户数"]
    result_shape:
      required_fields: ["SUM(销售额)", "SUM(利润)", "COUNTD(客户名称)", "利润率", "客单价"]
      row_count: 1
      max_rows: 1
    tolerances:
      numeric_rel: 0.001
      numeric_abs: 0.000001
    derived_metrics:
      required_fields: ["利润率", "客单价"]
  expected_gate: pass

- id: batch2.q2_followup_metric_trend
  group: batch2
  question: "这个指标过去几年的趋势是什么样子"
  connection_fixture: superstore_tableau
  previous_context:
    fixture: q1_sales_by_category_2024
  expected_patch:
    patch_type: clarify_reference
    contains:
      resolved_refs:
        - type: metric
          name: "销售额"
      nested_patch_types: ["set_time_range", "set_time_grain"]
  baseline:
    mode: mcp_snapshot
    expected_plan:
      metrics: ["销售额"]
    result_shape:
      required_fields: ["YEAR(发货日期)", "SUM(销售额)", "SUM(利润)", "COUNTD(客户名称)"]
      row_count: 5
      max_rows: 10
    tolerances:
      numeric_rel: 0.001
      row_set: exact
    identity_fields: ["YEAR(发货日期)"]
    numeric_fields: ["SUM(销售额)", "SUM(利润)", "COUNTD(客户名称)"]
  expected_gate: pass

