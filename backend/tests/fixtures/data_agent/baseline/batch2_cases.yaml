- id: batch2.q5_subcategories_without_sales_2025
  group: batch2
  question: "2025 年没有销售记录的子类别有哪些？"
  connection_fixture: superstore_tableau
  expected_patch:
    patch_type: reset_plan
    contains:
      operator: set_difference
      dimensions: ["子类别"]
      filters:
        - field_caption: "订单日期"
          operator: "between"
          value: ["2025-01-01", "2025-12-31"]
  baseline:
    mode: mcp_snapshot
    result_shape:
      required_fields: ["子类别"]
      row_count: 5
      max_rows: 100
    tolerances:
      row_set: exact
    identity_fields: ["子类别"]
  expected_gate: pass

- id: batch2.q6_top10_customers
  group: batch2
  question: "Top 10 大客户是谁？"
  connection_fixture: superstore_tableau
  expected_patch:
    patch_type: reset_plan
    contains:
      metrics: ["销售额"]
      dimensions: ["客户名称"]
      limit: 10
      order_by:
        - metric: "销售额"
          direction: "desc"
  baseline:
    mode: mcp_snapshot
    expected_plan:
      metrics: ["销售额"]
      dimensions: ["客户名称"]
    result_shape:
      required_fields: ["客户名称", "SUM(销售额)", "销售额占比"]
      row_count: 10
      max_rows: 10
    tolerances:
      numeric_rel: 0.001
      row_set: exact
    identity_fields: ["客户名称"]
    numeric_fields: ["SUM(销售额)", "销售额占比"]
    order:
      field: "SUM(销售额)"
      direction: desc
      top_n: 10
      identity_fields: ["客户名称"]
    derived_metrics:
      required_fields: ["销售额占比"]
  expected_gate: pass

