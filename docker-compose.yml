version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mulan-bi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mulan_bi
      POSTGRES_USER: mulan
      POSTGRES_PASSWORD: mulan
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mulan -d mulan_bi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb

  redis:
    image: redis:7-alpine
    container_name: mulan-bi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mulan-bi-celery
    restart: unless-stopped
    command: celery -A services.tasks worker --beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://mulan:mulan@postgres:5432/mulan_bi
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TABLEAU_ENCRYPTION_KEY: ${TABLEAU_ENCRYPTION_KEY:-}
      DATASOURCE_ENCRYPTION_KEY: ${DATASOURCE_ENCRYPTION_KEY:-}
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-}
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
