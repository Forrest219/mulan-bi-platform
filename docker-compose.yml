version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mulan-bi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mulan_bi
      POSTGRES_USER: mulan
      POSTGRES_PASSWORD: mulan
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mulan -d mulan_bi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb

  redis:
    image: redis:7-alpine
    container_name: mulan-bi-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mulan-bi-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mulan:mulan@postgres:5432/mulan_bi
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TABLEAU_MCP_GATEWAY_URL: http://tableau-mcp-gateway:3928/tableau-mcp
      TABLEAU_MCP_SERVER_URL: http://tableau-mcp-gateway:3928/tableau-mcp
      DATA_AGENT_CHAIN_MODE: mcp_proxy
      DATA_AGENT_MCP_PROXY_ENABLED: "true"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mulan-bi-celery
    restart: unless-stopped
    command: celery -A services.tasks worker --beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mulan:mulan@postgres:5432/mulan_bi
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TABLEAU_MCP_GATEWAY_URL: http://tableau-mcp-gateway:3928/tableau-mcp
      TABLEAU_MCP_SERVER_URL: http://tableau-mcp-gateway:3928/tableau-mcp
      DATA_AGENT_CHAIN_MODE: mcp_proxy
      DATA_AGENT_MCP_PROXY_ENABLED: "true"
      TZ: Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mulan-bi-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  tableau-mcp-gateway:
    build:
      context: ./tableau-mcp-gateway
      dockerfile: Dockerfile
    container_name: mulan-bi-tableau-mcp
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/backend:ro
    environment:
      DATABASE_URL: postgresql://mulan:mulan@postgres:5432/mulan_bi
      GATEWAY_PORT: "3928"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy

  # ── Reverse proxy (only externally exposed port) ──────────────────────────
  nginx:
    image: ghcr.io/nginxinc/nginx-unprivileged:alpine
    container_name: mulan-bi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - tableau-mcp-gateway

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
