# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  celery:
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: builder
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 80
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Dev mode: nginx not needed (Vite dev server has its own proxy)
  nginx:
    profiles: ["disabled"]
